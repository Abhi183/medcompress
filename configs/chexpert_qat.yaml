# configs/chexpert_qat.yaml
# QAT INT8 for CheXpert multi-label classification

task: classification
dataset: chexpert
seed: 42

data:
  root: data/chexpert/
  image_size: 224
  batch_size: 32
  val_split: 0.20
  augmentation: false

model:
  name: efficientnetb0
  num_classes: 5
  pretrained: false
  checkpoint: outputs/chexpert_baseline/best_model.keras

compression:
  method: qat
  quantize_layers: all
  per_channel: true

training:
  epochs: 10
  optimizer: adam
  learning_rate: 1.0e-5
  lr_schedule: constant
  loss: binary_crossentropy

export:
  tflite:
    enabled: true
    precision: int8
    calibration_samples: 200
  onnx:
    enabled: false

output:
  dir: outputs/chexpert_qat/
  tflite_path: outputs/chexpert_qat_int8.tflite
  log_wandb: true
  wandb_project: medcompress
